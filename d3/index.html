<!DOCTYPE html>
<html>
  <head>
    <style>
      /* Common */
      * {
        box-sizing: border-box;
        border: none;
      }
      svg {
        border: 1px solid #cdcdcd;
      }
      .viz {
        display: none;
      }
      .buttons {
        padding: 10px 10px;
      }
      button {
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 14px;
      }
      .buttons > button {
        color: white;
        background-color: #083a87;
      }
      .round {
        border-radius: 50%;
      }
      .fl-s {
        display: flex;
        justify-content: flex-start;
      }
      .fl {
        display: flex;
        justify-content: space-between;
      }
      .authors {
        padding: 10px 18px;
        font-style: italic;
        line-height: 28px;
        font-size: 0.9em;
      }
      .authors span {
        font-weight: bold;
        margin-right: 15px;
      }

      /* Felidae */
      #felidae-wrap {
        display: block; /* show at first */
      }
      #felidae-wrap .svg-wrap {
        height: 600px;
        overflow-y: scroll;
        border: 1px solid #cdcdcd;
      }
      #felidae-wrap svg {
        border: none;
      }
      #felidae-wrap .desc-wrap {
        width: 400px;
        min-height: 600px;
        height: 100%;
        border: 1px solid #cdcdcd;
        margin-left: 18px;
        padding: 10px;
      }
      #felidae-wrap .desc-wrap img {
        width: 100%;
      }
      #felidae-wrap .rank {
        color: white;
        padding: 4px 12px;
        border-radius: 4px;
      }
      #felidae-wrap .family {
        background-color: #093a87;
      }
      #felidae-wrap .genus {
        background-color: #831717;
      }
      #felidae-wrap .species {
        background-color: #0b780b;
      }

    </style>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.2.8/d3.min.js"
      type="text/JavaScript"
    ></script>
    <script
      src="https://d3js.org/colorbrewer.v1.min.js"
      type="text/JavaScript"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"
      type="text/JavaScript"
    ></script>
  </head>
  <body>
    <div class="fl">
      <div class="buttons">
        <button id="felidae">Felidae Taxon Hierarchy</button>
      </div>

      <div class="authors">
        <span>Data Visualization Group Project.</span>
        Created By Hangu Choi 
      </div>
    </div>
    <div id="felidae-wrap" class="viz">
      <h1>Felidae taxon hierarchy</h1>
      <div class="wrap fl-s">
        <div class="svg-wrap">
          <svg style="width: 900px; height: 3100px"></svg>
        </div>
        <div class="desc-wrap">
          <h4>Click circle image in the left hierarchy</h4>
        </div>
      </div>
    </div>
    <script src="./felidae.js"></script>
    <script>
      Felidae().start();

      document.querySelector("#felidae-wrap").style.display = "block";
    </script>
  </body>
</html>
