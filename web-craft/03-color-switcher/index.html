<!doctype html>
<html lang="en">
<head>
  <title>Color Switcher</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      /* background color is set by JavaScript */
      transition: background-color 0.5s;  /* smooth color change! */
    }

    .card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    h1 {
      font-size: 1.8rem;
      color: white;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    #color-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    #btn-random {
      background: white;
      color: #2d3436;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 20px;
      display: block;
      width: 100%;
    }
    #btn-random:hover  { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    #btn-random:active { transform: scale(0.97); }

    /* Row of preset color buttons */
    .swatches {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.7);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .swatch:hover { transform: scale(1.2); }
  </style>
</head>
<body>
<style>
  .wc-nav { position: fixed; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 1000; }
  .wc-nav a { background: rgba(0,0,0,0.65); color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-family: Arial, sans-serif; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); }
  .wc-nav a:hover { background: rgba(0,0,0,0.9); }
</style>
<nav class="wc-nav">
  <a href="/">&#127968; Home</a>
  <a href="/web-craft/">&#8592; Examples</a>
</nav>

<div class="card">
  <h1>Current color:</h1>
  <div id="color-name">—</div>

  <button id="btn-random">Random Color</button>

  <div class="swatches" id="swatches"></div>
</div>

<script>
  // --- Our collection of named colors ---
  // Add or remove colors from this list!
  const colors = [
    { name: 'Sky Blue',      hex: '#00b7ff' },
    { name: 'Coral',         hex: '#e17055' },
    { name: 'Mint',          hex: '#00cec9' },
    { name: 'Lavender',      hex: '#a29bfe' },
    { name: 'Sunflower',     hex: '#fdcb6e' },
    { name: 'Hot Pink',      hex: '#fd79a8' },
    { name: 'Emerald',       hex: '#00b894' },
    { name: 'Blueberry',     hex: '#6c5ce7' },
    { name: 'Tomato',        hex: '#d63031' },
    { name: 'Ocean',         hex: '#0984e3' },
    { name: 'Peach',         hex: '#fab1a0' },
    { name: 'Forest',        hex: '#55a83b' },
  ];

  const body      = document.body;
  const colorName = document.getElementById('color-name');
  const swatchBox = document.getElementById('swatches');

  // Set the background and update the label
  function setColor(color) {
    body.style.backgroundColor = color.hex;
    colorName.textContent = color.name + '  ' + color.hex;
  }

  // Pick a random color from the array
  function randomColor() {
    const index = Math.floor(Math.random() * colors.length);
    setColor(colors[index]);
  }

  // Build the swatch buttons from the colors array
  colors.forEach(function(color) {
    const btn = document.createElement('button');
    btn.className = 'swatch';
    btn.style.backgroundColor = color.hex;
    btn.title = color.name;
    btn.addEventListener('click', function() { setColor(color); });
    swatchBox.appendChild(btn);
  });

  // Hook up the Random button
  document.getElementById('btn-random').addEventListener('click', randomColor);

  // Start with a random color
  randomColor();
</script>

</body>
</html>
