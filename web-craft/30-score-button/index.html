<!doctype html>
<html lang="en">
<head>
  <title>Score Button</title>
  <meta charset="utf-8">
  <style>
    body   { font-family: Arial; text-align: center; padding: 80px; background: #1a1a2e; color: white; }
    h1     { font-size: 6rem; }
    button { font-size: 1.3rem; padding: 14px 36px; margin: 8px; cursor: pointer; border: none; border-radius: 10px; }
  </style>
</head>
<body>

  <p style="font-size:1.4rem">🏀 My Score</p>
  <h1 id="score">0</h1>

  <button style="background:#ff6b35; color:white;" onclick="addPoint()">+ Point</button>
  <button style="background:#444;"                onclick="location.reload()">Reset</button>

  <script>
    let score = 0;
    function addPoint() {
      score = score + 1;
      document.getElementById('score').textContent = score;
    }
  </script>

</body>
</html>
