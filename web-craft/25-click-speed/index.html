<!doctype html>
<html lang="en">
<head>
  <title>Click Speed Challenge</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 80px 20px 20px;
    }

    h1 {
      color: #f9ca24;
      font-size: 2.2rem;
      text-shadow: 0 0 20px rgba(249, 202, 36, 0.4);
    }

    /* The countdown timer */
    .timer {
      font-size: 4rem;
      font-weight: 900;
      color: white;
      min-width: 60px;
      text-align: center;
      transition: color 0.3s;
    }
    .timer.urgent { color: #e74c3c; animation: pulse 0.5s infinite alternate; }

    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

    /* Click count */
    .click-count {
      font-size: 5rem;
      font-weight: 900;
      color: #f9ca24;
      text-shadow: 0 0 24px rgba(249, 202, 36, 0.5);
      line-height: 1;
      transition: transform 0.07s;
    }
    .click-count.pop { transform: scale(1.15); }

    .sub-label {
      color: #666;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
    }

    /* The big click button */
    .click-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(145deg, #f9ca24, #e67e22);
      border: none;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: inherit;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(249, 202, 36, 0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
    }
    .click-btn:hover  { transform: scale(1.04); box-shadow: 0 12px 40px rgba(249, 202, 36, 0.5); }
    .click-btn:active { transform: scale(0.92); }
    .click-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Result card */
    .result-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px 40px;
      text-align: center;
      display: none;
    }
    .result-card.show { display: block; }

    .result-cps {
      font-size: 3rem;
      color: #f9ca24;
      font-weight: 900;
    }

    .result-label {
      color: #aaa;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .result-rating {
      font-size: 1.4rem;
      margin-top: 8px;
    }

    .play-again {
      margin-top: 16px;
      background: transparent;
      border: 2px solid #f9ca24;
      color: #f9ca24;
      border-radius: 30px;
      padding: 10px 30px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .play-again:hover { background: #f9ca24; color: #1a1a2e; }
  </style>
</head>
<body>

<style>
  .wc-nav { position: fixed; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 1000; }
  .wc-nav a { background: rgba(0,0,0,0.65); color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-family: Arial, sans-serif; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); }
  .wc-nav a:hover { background: rgba(0,0,0,0.9); }
</style>
<nav class="wc-nav">
  <a href="/">&#127968; Home</a>
  <a href="/web-craft/">&#8592; Examples</a>
</nav>

<h1>⚡ Click Speed Challenge</h1>

<div class="timer" id="timer">5</div>

<div class="click-count" id="click-count">0</div>
<div class="sub-label">clicks</div>

<button class="click-btn" id="click-btn" onclick="handleClick()">CLICK!</button>

<div class="result-card" id="result-card">
  <div class="result-label">CLICKS PER SECOND</div>
  <div class="result-cps" id="result-cps">0</div>
  <div class="result-rating" id="result-rating"></div>
  <button class="play-again" onclick="reset()">Play Again</button>
</div>

<script>
  const GAME_DURATION = 5;  // seconds

  let clicks       = 0;
  let timeLeft     = GAME_DURATION;
  let gameRunning  = false;
  let timerHandle  = null;

  const timerEl      = document.getElementById('timer');
  const countEl      = document.getElementById('click-count');
  const clickBtn     = document.getElementById('click-btn');
  const resultCard   = document.getElementById('result-card');
  const resultCpsEl  = document.getElementById('result-cps');
  const resultRating = document.getElementById('result-rating');

  function handleClick() {
    // First click starts the countdown
    if (!gameRunning) {
      startGame();
    }

    clicks++;
    countEl.textContent = clicks;

    // Quick pop animation
    countEl.classList.add('pop');
    setTimeout(() => countEl.classList.remove('pop'), 80);
  }

  function startGame() {
    gameRunning = true;
    timeLeft = GAME_DURATION;

    timerHandle = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;

      if (timeLeft <= 2) {
        timerEl.className = 'timer urgent';
      }

      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    clearInterval(timerHandle);
    gameRunning = false;
    clickBtn.disabled = true;

    // Calculate CPS and show result
    const cps = (clicks / GAME_DURATION).toFixed(1);
    resultCpsEl.textContent = cps;
    resultRating.textContent = getRating(Number(cps));
    resultCard.className = 'result-card show';
  }

  function getRating(cps) {
    if (cps >= 12) return '🔥 LEGENDARY!';
    if (cps >= 9)  return '⚡ Lightning Fast!';
    if (cps >= 6)  return '🚀 Super Fast!';
    if (cps >= 4)  return '👍 Nice Speed!';
    if (cps >= 2)  return '😊 Good Start!';
    return '🐢 Keep Practicing!';
  }

  function reset() {
    clicks = 0;
    timeLeft = GAME_DURATION;
    gameRunning = false;
    clearInterval(timerHandle);

    countEl.textContent = 0;
    timerEl.textContent = GAME_DURATION;
    timerEl.className = 'timer';
    clickBtn.disabled = false;
    resultCard.className = 'result-card';
  }
</script>

</body>
</html>
