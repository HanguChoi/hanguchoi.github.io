<!doctype html>
<html lang="en">
<head>
  <title>Drawing Canvas</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    h1 { font-size: 1.4rem; margin-bottom: 12px; color: #2d3436; }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      background: white;
      padding: 12px 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 12px;
      width: min(800px, 100%);
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tool-group label {
      font-size: 0.8rem;
      color: #636e72;
      font-weight: bold;
    }

    /* Color swatches */
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch:hover      { transform: scale(1.15); }
    .color-swatch.selected   { border-color: #2d3436; transform: scale(1.15); }

    input[type="color"] {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 1px;
    }

    input[type="range"] { accent-color: #00b7ff; width: 90px; }

    /* Tool buttons */
    .tool-btn {
      background: #f0f4f8;
      border: 1px solid #dfe6e9;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .tool-btn:hover   { background: #dfe6e9; }
    .tool-btn.active  { background: #00b7ff; color: white; border-color: #00b7ff; }

    /* ---- Canvas ---- */
    canvas {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      cursor: crosshair;
      touch-action: none; /* for mobile drawing */
      display: block;
      max-width: 100%;
    }

    .size-preview {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #size-dot {
      background: #2d3436;
      border-radius: 50%;
    }
  </style>
</head>
<body>
<style>
  .wc-nav { position: fixed; top: 12px; left: 12px; display: flex; gap: 8px; z-index: 1000; }
  .wc-nav a { background: rgba(0,0,0,0.65); color: white; text-decoration: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-family: Arial, sans-serif; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); }
  .wc-nav a:hover { background: rgba(0,0,0,0.9); }
</style>
<nav class="wc-nav">
  <a href="/">&#127968; Home</a>
  <a href="/web-craft/">&#8592; Examples</a>
</nav>

<h1>Drawing Canvas</h1>

<div class="toolbar">

  <!-- Colors -->
  <div class="tool-group">
    <label>Color</label>
    <div id="swatches"></div>
    <input type="color" id="custom-color" value="#000000" title="Custom color">
  </div>

  <!-- Brush size -->
  <div class="tool-group">
    <label>Size</label>
    <input type="range" id="size" min="1" max="400" value="6">
    <div class="size-preview"><div id="size-dot"></div></div>
  </div>

  <!-- Tool (draw / erase) -->
  <div class="tool-group">
    <button class="tool-btn active" id="btn-draw">✏️ Draw</button>
    <button class="tool-btn" id="btn-erase">🧹 Erase</button>
  </div>

  <!-- Actions -->
  <div class="tool-group">
    <button class="tool-btn" id="btn-clear">🗑️ Clear</button>
    <button class="tool-btn" id="btn-save">💾 Save</button>
  </div>

</div>

<canvas id="canvas"></canvas>

<script>
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');

  // Fit canvas to window
  function resize() {
    const w = Math.min(800, window.innerWidth - 32);
    const h = Math.min(500, window.innerHeight - 200);
    // Save content before resize
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width  = w;
    canvas.height = h;
    ctx.putImageData(img, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Drawing state ----
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let color    = '#000000';
  let size     = 6;
  let tool     = 'draw'; // 'draw' or 'erase'

  // ---- Color swatches ----
  const palette = ['red','#000000','#e17055','#fdcb6e','#00b894','#00b7ff','#6c5ce7','#fd79a8','#ffffff'];
  const swatchesEl = document.getElementById('swatches');
  swatchesEl.style.display = 'flex';
  swatchesEl.style.gap = '6px';

  palette.forEach(function(c) {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === color ? ' selected' : '');
    s.style.background = c;
    s.style.border = c === '#ffffff' ? '2px solid #dfe6e9' : '2px solid transparent';
    s.addEventListener('mouseover', function() {
      setColor(c);
      document.getElementById('custom-color').value = c;
    });
    swatchesEl.appendChild(s);
  });

  function setColor(c) {
    color = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    // Find and mark the matching swatch
    Array.from(swatchesEl.children).forEach(s => {
      if (s.style.backgroundColor === hexToRgb(c) || s.style.background === c) {
        s.classList.add('selected');
      }
    });
  }

  // Quick hex → rgb string (browser stores colors as rgb)
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return 'rgb(' + r + ', ' + g + ', ' + b + ')';
  }

  document.getElementById('custom-color').addEventListener('input', function() {
    color = this.value;
  });

  // ---- Brush size ----
  const sizeInput = document.getElementById('size');
  const sizeDot   = document.getElementById('size-dot');

  sizeInput.addEventListener('input', function() {
    size = parseInt(this.value);
    sizeDot.style.width  = Math.min(size, 24) + 'px';
    sizeDot.style.height = Math.min(size, 24) + 'px';
  });
  // Init dot
  sizeDot.style.width = size + 'px';
  sizeDot.style.height = size + 'px';

  // ---- Tool buttons ----
  document.getElementById('btn-draw').addEventListener('click', function() {
    tool = 'draw';
    canvas.style.cursor = 'crosshair';
    this.classList.add('active');
    document.getElementById('btn-erase').classList.remove('active');
  });
  document.getElementById('btn-erase').addEventListener('click', function() {
    tool = 'erase';
    canvas.style.cursor = 'cell';
    this.classList.add('active');
    document.getElementById('btn-draw').classList.remove('active');
  });
  document.getElementById('btn-clear').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
  document.getElementById('btn-save').addEventListener('click', function() {
    const link = document.createElement('a');
    link.download = 'my-drawing.png';
    link.href = canvas.toDataURL();
    link.click();
  });

  // ---- Mouse drawing ----
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function startDraw(e) {
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    // Draw a dot on click (no drag needed)
    ctx.beginPath();
    ctx.arc(lastX, lastY, (tool === 'erase' ? size * 2 : size) / 2, 0, Math.PI * 2);
    ctx.fillStyle = tool === 'erase' ? 'white' : color;
    ctx.fill();
  }

  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = tool === 'erase' ? 'white' : color;
    ctx.lineWidth   = tool === 'erase' ? size * 3 : size;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();

    lastX = pos.x;
    lastY = pos.y;
  }

  function stopDraw() { isDrawing = false; }

  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('mouseup',    stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  // Touch support
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove',  draw,       { passive: false });
  canvas.addEventListener('touchend',   stopDraw);
</script>

</body>
</html>
